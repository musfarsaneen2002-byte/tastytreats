<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/images/tasty-treats-logo.jpg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/src/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasty Treats | Premium Tea Shop</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="navbar-placeholder"></div>

  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title animate-in delay-1">Sip the Extraordinary</h1>
      <p class="hero-subtitle animate-in delay-2">Discover premium organic teas, vibrant fresh juices, and artisanal
        snacks crafted for your perfect moment.</p>
      <a href="/menu.html" class="btn btn-primary animate-in delay-3">Explore Menu</a>
    </div>
  </header>

  <section class="section">
    <h2 class="section-title">Our Bestsellers</h2>
    <div class="menu-grid" id="menu-grid">
      <!-- Bestsellers will be loaded via main.js if needed or kept static -->
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">Latest from Our Blog</h2>
    <div class="latest-blog-container" id="latest-blog-container">
      <!-- Latest blog post will be loaded here -->
    </div>
  </section>

  <section class="section social-section">
    <h2 class="section-title">Follow Tasty Treats</h2>
    <a href="https://www.instagram.com/_tasty.treats._/" class="instagram-follow-link" target="_blank"
      rel="noopener noreferrer" aria-label="Follow Tasty Treats on Instagram">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24"
        aria-hidden="true">
        <rect width="16" height="16" x="4" y="4" stroke="currentColor" stroke-width="2" rx="5" />
        <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="2" />
        <circle cx="17" cy="7" r="1.2" fill="currentColor" />
      </svg>
      <span>@_tasty.treats._</span>
    </a>
  </section>

  <section class="section reviews-section">
    <div class="container">
      <h2 class="section-title">Customer Reviews</h2>

      <div class="reviews-list-container animate-in">
        <h3 class="reviews-title">What Customers Say</h3>
        <div id="reviews-list" class="reviews-list">
          <div class="loading-message">Loading reviews...</div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script type="module" src="/src/components.js"></script>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/reviews.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
